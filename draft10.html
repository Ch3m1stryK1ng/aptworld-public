<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>产品详情</title>
  <style>
    body{margin:0;font:14px/1.5 system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;background:#f6f8fb;color:#0f172a}
    .container{max-width:960px;margin:0 auto;padding:16px}
    header{position:sticky;top:0;background:#fff;border-bottom:1px solid #e5e7eb}
    .nav{display:flex;gap:16px;align-items:center;padding:12px 16px}
    a{text-decoration:none;color:inherit}
    .card{background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:16px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
    .muted{color:#64748b}
    .chip{display:inline-block;background:#eef2ff;border:1px solid #e0e7ff;border-radius:999px;padding:2px 8px;margin-right:6px}
    .row{display:flex;gap:8px;flex-wrap:wrap}
    .kv{display:grid;grid-template-columns:1fr 1fr;gap:6px 12px;margin-top:8px;color:#64748b}
    img{max-width:100%;border-radius:12px}
    .btn{display:inline-block;padding:8px 12px;border:1px solid #e5e7eb;border-radius:10px;background:#fff}
    .btn.primary{background:#4f46e5;color:#fff;border-color:#4f46e5}
  </style>
</head>
<body>
  <header>
    <nav class="nav container">
      <a href="index.html">首页</a>
      <a href="products.html"><strong>产品中心</strong></a>
      <a href="downloads.html">下载中心</a>
      <a href="about.html">关于我们</a>
      <a class="btn" href="contact.html">联系我们</a>
    </nav>
  </header>

  <main class="container">
    <a href="products.html" class="btn">← 返回列表</a>
    <div id="view" class="card" style="margin-top:12px"></div>
  </main>

  <script>
    // 与 products.html 保持一致（可考虑提到单独的 products.json 里复用）
    const PRODUCTS = [
      /* 把 products.html 里的 PRODUCTS 数组复制过来，或改成 fetch('products.json') */
    ];

    const params = new URLSearchParams(location.search);
    const sku = params.get('sku') || '';
    const p = PRODUCTS.find(x => x.sku === sku);

    const $ = s => document.querySelector(s);
    const fmtKg = n => `${n.toFixed(1)} kg`;

    if (!p) {
      $('#view').innerHTML = `<div class="muted">未找到 SKU：${sku}。请从 <a href="products.html">产品中心</a> 重新选择。</div>`;
    } else {
      document.title = p.name + '｜产品详情';
      $('#view').innerHTML = `
        <div class="row" style="align-items:flex-start">
          <div style="flex:1">
            <img src="${p.coverImage}" alt="${p.name}">
          </div>
          <div style="flex:1">
            <h2 style="margin:0 0 6px 0">${p.name}</h2>
            <div class="muted">${p.sku}</div>
            <div style="margin-top:8px">
              <span class="chip">${p.profile}</span>
              <span class="chip">${p.grooves} 槽</span>
              <span class="chip">⌀ ${p.pitchDiameter} mm</span>
              <span class="chip">${p.balancing}</span>
            </div>
            <div class="kv">
              <div>材质</div><div>${p.material}</div>
              <div>涂层</div><div>${p.coating}</div>
              <div>装配</div><div>${p.bush}</div>
              <div>孔径范围</div><div>${p.boreRange}</div>
              <div>重量</div><div>${fmtKg(p.weight)}</div>
            </div>
            <div style="margin-top:12px">
              <strong>应用 / 优势</strong>
              <ul style="margin:6px 0 0 18px">
                ${[...(p.features||[]), ...(p.applications||[])].map(x=>`<li>${x}</li>`).join('')}
              </ul>
            </div>
            <div class="row" style="margin-top:12px">
              <a class="btn primary" href="contact.html?sku=${encodeURIComponent(p.sku)}">询价</a>
            </div>
          </div>
        </div>
      `;
    }
  </script>
</body>
</html>
