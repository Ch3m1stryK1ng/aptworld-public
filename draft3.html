<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" type="text/css" href="./css/team.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <link rel="stylesheet" type="text/css" href="./css/advert.css" />
    <link rel="stylesheet" type="text/css" href="./css/swiper.min.css" />
    <link rel="stylesheet" type="text/css" href="./css/product-card.css" />
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
</head>

<body>
    <section class="team-section">
        <div class="team-picture-wrapper">
            <picture>
                <img src="images/home/team-background.webp" alt="team-background" loading="lazy" />
            </picture>
            <div class="team-picture-overlay"></div>
        </div>

        <div class="team-title" data-animate="fadeInLeft" data-delay="0s">
            <h2>Our Team</h2>
        </div>

        <div class="swiper team-swiper">
            <div class="swiper-wrapper">
            </div>
            <div class="swiper-pagination" id="teamPagination"></div>
        </div>

        <div class="more-button-container">
            <a href="subpage/about_us/company_profile.html" class="more-button" data-aos="zoom-in">More Staff
                Information</a>
        </div>
    </section>

    <script src="js/team-data.js" type="text/javascript" charset="utf-8"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="js/team.js" type="text/javascript" charset="utf-8"></script>
</body>

</html>
